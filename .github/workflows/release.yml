name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to rebuild (e.g. v0.10.0)'
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
            rust-targets: ''
          - platform: windows-latest
            args: --bundles nsis
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: SeeNote ${{ inputs.tag || github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets to user-friendly names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases" --paginate \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id")

          rename_asset() {
            local from="$1"
            local to="$2"
            local asset_id
            asset_id=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --paginate \
              --jq ".[] | select(.name == \"$from\") | .id")
            if [ -n "$asset_id" ]; then
              gh api -X PATCH "repos/${REPO}/releases/assets/${asset_id}" -f name="$to" >/dev/null
              echo "Renamed: $from -> $to"
            else
              echo "Skipped (not found): $from"
            fi
          }

          rename_asset "SeeNote_${VERSION}_universal.dmg"    "SeeNote-macOS.dmg"
          rename_asset "SeeNote_${VERSION}_amd64.AppImage"   "SeeNote-Linux.AppImage"
          rename_asset "SeeNote_${VERSION}_amd64.deb"        "SeeNote-Linux.deb"
          rename_asset "SeeNote_${VERSION}_x64-setup.exe"    "SeeNote-Windows.exe"

