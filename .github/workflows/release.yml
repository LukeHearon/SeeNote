name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --bundles appimage
            rust-targets: ''
          - platform: windows-latest
            args: --bundles nsis
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SeeNote ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets to user-friendly names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq .id)

          rename_asset() {
            local from="$1"
            local to="$2"
            local asset_id
            asset_id=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" --paginate \
              --jq ".[] | select(.name == \"$from\") | .id")
            if [ -n "$asset_id" ]; then
              gh api -X PATCH "repos/${REPO}/releases/assets/${asset_id}" -f name="$to" >/dev/null
              echo "Renamed: $from -> $to"
            else
              echo "Skipped (not found): $from"
            fi
          }

          rename_asset "SeeNote_${VERSION}_universal.dmg"    "SeeNote-macOS.dmg"
          rename_asset "SeeNote_${VERSION}_amd64.AppImage"   "SeeNote-Linux.AppImage"
          rename_asset "SeeNote_${VERSION}_x64-setup.exe"    "SeeNote-Windows.exe"

  update-cask:
    needs: rename-assets
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Download macOS DMG and update Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          DMG_NAME="SeeNote-macOS.dmg"

          gh release download "$TAG" \
            --repo LukeHearon/SeeNote \
            --pattern "$DMG_NAME" \
            --dir /tmp/dmgs

          SHA=$(shasum -a 256 "/tmp/dmgs/${DMG_NAME}" | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/LukeHearon/homebrew-seenote.git /tmp/tap
          cat > /tmp/tap/Casks/seenote.rb << CASK
          cask "seenote" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/LukeHearon/SeeNote/releases/download/v#{version}/SeeNote-macOS.dmg"
            name "SeeNote"
            desc "Audio/video annotation tool for building ML training datasets"
            homepage "https://github.com/LukeHearon/SeeNote"

            app "SeeNote.app"
          end
          CASK

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/seenote.rb
          git commit -m "Update seenote cask to ${VERSION}"
          git push
